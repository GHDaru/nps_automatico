services:
  backend:
    build:
      context: ./backend
      dockerfile: ./docker/backend.dockerfile
    restart: always
    ports:
      - "5020:5020"
    env_file:
      - backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:5020
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
